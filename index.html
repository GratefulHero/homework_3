<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма</title>
</head>
<body>
    <form action="#" method="post">
        <label for="name">Имя:</label> <br>
        <input type="text" placeholder="Иван" name="name" id="name" required> <br><br>

        <label for="email">Email:</label> <br>
        <input type="email" placeholder="email@mail.ru" name="email" id="email" required> <br><br>

        <label for="password">Пароль:</label> <br>
        <input type="password" placeholder="Пароль" name="password" id="password" required> <br><br>

        <label for="age">Возраст:</label> <br>
        <input type="number" placeholder="25" name="age" id="age" required> <br><br>

        <input type="radio" value="man" name="gender" required> Мужской <br>
        <input type="radio" value="woman" name="gender" required> Женский <br><br>

        <input type="checkbox" required>Согласие с условиями<br><br>

        <label for="city">Выберите город проживания</label>
        <select name="city" required>
            <option value="msk">Москва</option>
            <option value="nsk">Новосибирск</option>
            <option value="tsk">Томск</option>
            <option value="another">Другой</option>
        </select> <br><br>

        <label id="info">О себе:</label> <br>
        <textarea rows="8" cols="45" placeholder="Я Иванов Иван Иванович" name="info" id="info" required></textarea> <br><br>
        
   
        <button type="submit" name=button id="button">Отправить данные</button>
    </form>
    
</body>
</html>
